<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NeoMenu - Sistema de Gestão</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .logo {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f97316, #dc2626);
            color: white;
        }
        
        .btn-secondary {
            background: #334155;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
        }
        
        .info {
            margin-top: 40px;
            color: #64748b;
            font-size: 12px;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 2rem; }
            .btn { padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍽️</div>
        <h1>NeoMenu</h1>
        <p class="subtitle">Sistema de Gestão Profissional</p>
        
        <div class="buttons">
            <a href="noemenu-cloud.html" class="btn btn-primary">
                🔐 Acessar Sistema Admin
            </a>
            <a href="cardapio-online.html" class="btn btn-secondary">
                📱 Cardápio Online
            </a>
        </div>
        
        <div class="info">
            <p>Sistema sincronizado em tempo real via Firebase</p>
            <p>Versão 2.2.0 | TEF Hamburgueria</p>
        </div>
    </div>
</body>
</html>
